<svg viewBox="0 0 167 168"
     xmlns="http://www.w3.org/2000/svg"
     shape-rendering="geometricPrecision">

  <style>
    /* Couleur par défaut (mode clair) */
    .stroke {
      stroke: black;
    }

    /* Mode sombre */
    @media (prefers-color-scheme: dark) {
      .stroke {
        stroke: white;
      }
    }
  </style>

  <!-- cercle -->
  <circle cx="83.5" cy="84" r="81"
          class="stroke"
          stroke-width="5"
          fill="none"/>

  <!-- diagonale -->
  <line x1="11" y1="124.08"
        x2="72.2" y2="41.9"
        class="stroke"
        stroke-width="3"/>

  <!-- ligne verticale -->
  <line x1="72.5" y1="43"
        x2="72.5" y2="124"
        class="stroke"
        stroke-width="3"/>

  <!-- ligne horizontale -->
  <line x1="40" y1="84.5"
        x2="71" y2="84.5"
        class="stroke"
        stroke-width="3"/>

  <!-- arcs simplifiés -->
  <path d="M72.5 43 A40 40 0 0 1 72.5 123"
        class="stroke"
        stroke-width="3"
        fill="none"/>

  <path d="M112 43 A40 40 0 0 0 112 123"
        class="stroke"
        stroke-width="3"
        fill="none"
        transform="translate(42,0)"/>

</svg>